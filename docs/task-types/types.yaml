# CyDo Task Type Definitions
#
# Types define agent behavior, capabilities, and flow control.
#
# Flow control:
#   - creatable_tasks: modal sub-tasks (agent stays alive, gets results back)
#   - continuations: exec-style successors (agent is done, next task takes over)
#   - requires_approval: all stewards must approve before successor spawns

task_types:
  # =========================================================================
  # Interactive types — user-facing, context-preserving
  #
  # These are the entry points for user interaction. All continuations use
  # keep_context (SwitchMode) to preserve the session — the interactive
  # cluster is self-contained. Autonomous work (triage, implement, etc.)
  # is spawned via creatable_tasks, not continuations.
  # =========================================================================

  blank:
    description: "Raw Claude Code session with no prompt wrapping or tool restrictions"
    model_class: large
    output_type: report
    continuations:
      plan:
        task_type: plan_mode
        keep_context: true
      bug:
        task_type: bug_mode
        keep_context: true
    parallelizable: true
    user_visible: true

  conversation:
    description: "Open-ended interactive session with the user"
    prompt_template: prompts/conversation.md
    model_class: large
    output_type: report
    creatable_tasks: [plan, research, spike, verify, triage, implement]
    continuations:
      plan:
        task_type: plan_mode
        keep_context: true
      bug:
        task_type: bug_mode
        keep_context: true
    parallelizable: true
    user_visible: true

  plan_mode:
    description: "Interactive planning mode — explore, plan, get approval, then implement"
    agent_description: >
      Switch to planning mode for non-trivial implementation tasks. Prefer
      switching to plan mode — it's better to get alignment upfront than to
      redo work. The session becomes read-only — you explore the codebase,
      produce a detailed implementation plan, then switch back to conversation.
      The user reviews the plan and decides when to execute it.

      Switch when ANY of these apply:
      - New feature: adding meaningful new functionality (e.g. "add a logout
        button" — where should it go? what happens on click?)
      - Multiple valid approaches: the task can be solved several ways (e.g.
        "add caching" — Redis vs in-memory vs file-based)
      - Architectural decisions: choosing between patterns or technologies
        (e.g. "add real-time updates" — WebSockets vs SSE vs polling)
      - Multi-file changes: the task will touch more than 2-3 files (e.g.
        "refactor the authentication system")
      - Unclear scope: you need to explore before understanding the full
        extent (e.g. "make the app faster" — need to profile first)
      - Changes to existing behavior: modifying how something currently works
        (e.g. "update the login flow" — what exactly should change?)
      - User preferences matter: the implementation could reasonably go
        multiple ways — plan mode lets you explore first, then present
        options with context

      Do NOT switch for:
      - Single-line or few-line fixes (typos, obvious bugs, small tweaks)
      - Tasks where the user gave very specific, detailed instructions
      - Pure research or exploration (use research sub-tasks instead)
    tool_guidance: >
      Prefer switching to plan mode — it's better to get alignment upfront
      than to redo work. If unsure, err on the side of planning. Confirm the
      task scope with the user before switching. The switch preserves your
      conversation context but the session becomes read-only. Use research
      sub-tasks to gather additional context. Switch back to return to
      conversation when the plan is ready for user review.
    prompt_template: prompts/plan_mode.md
    model_class: large
    read_only: true
    output_type: report
    creatable_tasks: [research, spike]
    continuations:
      back:
        task_type: conversation
        keep_context: true
    parallelizable: true
    user_visible: false

  bug_mode:
    description: "Interactive bug investigation — reproduce, diagnose, then fix"
    agent_description: >
      Switch to bug investigation mode when the user reports unexpected
      behavior, a test is failing, or something works differently than
      expected. You systematically reproduce the issue, identify the root
      cause, and determine the fix approach. Can create spike and research
      sub-tasks. When done, switch to plan_mode (large fix) or switch back
      to conversation with findings (small fix or non-bug).
    tool_guidance: >
      Switch when the user describes a bug or unexpected behavior. Gather
      reproduction steps and error messages before switching. Switch back
      if investigation reveals it's not a bug or the fix is small enough
      for conversation to handle directly.
    prompt_template: prompts/bug_mode.md
    model_class: large
    output_type: report
    creatable_tasks: [research, spike]
    continuations:
      needs_plan:
        task_type: plan_mode
        keep_context: true
      back:
        task_type: conversation
        keep_context: true
    parallelizable: true
    user_visible: false

  # =========================================================================
  # Helper types — sub-task only, no continuations
  #
  # These are created by other agents via creatable_tasks. They run to
  # completion and return their output to the parent. No state machine.
  # =========================================================================

  plan:
    description: "Create a detailed implementation plan"
    agent_description: >
      Software architect agent for designing implementation plans. Reads the
      codebase, identifies critical files, considers trade-offs, and returns a
      step-by-step plan with file-by-file changes. Does not write code — use
      'implement' for that. Use when: a task touches more than 2-3 files, there
      are multiple valid approaches and you need to evaluate trade-offs, you're
      unsure where to start, or the change requires understanding existing
      patterns before diving in. Plans are cheap; rework is expensive.
    tool_guidance: >
      Recommended before any non-trivial implementation. Use when a task has
      multiple valid approaches, touches many files, or requires understanding
      existing patterns before making changes.
    prompt_template: prompts/plan.md
    model_class: large
    read_only: true
    output_type: report
    creatable_tasks: [research, spike]
    parallelizable: true
    user_visible: true

  research:
    description: "Investigate a topic, gather information, produce findings"
    agent_description: >
      Fast read-only agent for exploring codebases and gathering information.
      Use when: you need to understand how a subsystem works before modifying it,
      you need to find all callers of a function across the codebase, you need to
      read and synthesize information from multiple files, you're exploring
      unfamiliar code, or answering questions like "how does authentication work?".
      Returns a structured report with findings, file paths, and recommendations.
      No code changes are made. When calling this agent, specify the desired
      thoroughness level: "quick" for basic searches, "medium" for moderate
      exploration, or "thorough" for comprehensive analysis across multiple
      locations and naming conventions.
    tool_guidance: >
      Prefer this over doing your own exploration — it keeps your context clean
      and runs fast. Use for broader codebase exploration, deep research, or any
      open-ended search that may require multiple rounds of globbing and grepping.
      Specify thoroughness in the prompt: "quick" for targeted lookups, "thorough"
      for exhaustive exploration.
    prompt_template: prompts/research.md
    model_class: medium
    read_only: true
    output_type: report
    parallelizable: true
    user_visible: true

  bug:
    description: "Investigate a bug report — reproduce, find root cause, report findings"
    agent_description: >
      Use for investigating bugs as a sub-task. The agent reproduces the issue,
      identifies the root cause, and reports findings back to the parent.
      Creates spike sub-tasks for reproduction and research sub-tasks for
      context. Use when: a user reports unexpected behavior, a test is
      failing and you don't know why, you need to reproduce and diagnose an
      issue, or something works differently than the code suggests it should.
    tool_guidance: >
      Provide the bug description, reproduction steps, or error messages in the
      prompt. Prefer this over investigating bugs inline — the agent has
      dedicated context for systematic debugging.
    prompt_template: prompts/bug.md
    model_class: large
    output_type: report
    creatable_tasks: [research, spike]
    parallelizable: true
    user_visible: true

  spike:
    description: "Test a theory or prototype an approach in an isolated worktree"
    agent_description: >
      Use when you need to test a theory, prototype an approach, or verify
      feasibility before committing to a plan. Runs in its own worktree so
      experiments don't pollute the main tree. The agent can write code, run
      tests, and try things freely. Results are reported back as a report
      that includes the worktree path, so the parent can adopt changes from
      it if the experiment was successful. Good for: "will this library work
      for our use case?", "can I reproduce this with a minimal example?",
      "what happens if I restructure this module?".
    tool_guidance: >
      Use when you want to try something before committing to it. The worktree
      is disposable — experiment freely.
    prompt_template: prompts/spike.md
    model_class: medium
    output_type: report
    worktree: true
    parallelizable: true
    user_visible: false

  test:
    description: "Write or fix tests for implemented changes"
    agent_description: >
      Use to add test coverage for new or changed code. Works on the same
      tree as the parent implementation task.
    prompt_template: prompts/test.md
    model_class: medium
    output_type: patch
    parallelizable: true
    user_visible: false

  # =========================================================================
  # Autonomous pipeline — state machine with recursive decomposition
  #
  # These types form the plan → triage → implement → verify → review chain.
  # Agents proceed through continuations without user interaction (unless
  # gated by requires_approval). Stewards review at approval gates.
  # =========================================================================

  triage:
    description: "Decide whether a plan should be implemented directly or decomposed"
    prompt_template: prompts/triage.md
    model_class: large
    read_only: true
    output_type: report
    continuations:
      implement:
        task_type: implement
        requires_approval: true
      decompose:
        task_type: decompose
        requires_approval: true
        keep_context: true
    parallelizable: true
    user_visible: false

  decompose:
    description: "Split a plan into parallel sub-tasks"
    agent_description: >
      Use when a plan is too large for a single implementation task. Creates
      multiple parallel implement tasks and waits for all to complete.
    prompt_template: prompts/decompose.md
    model_class: large
    read_only: true
    output_type: report
    creatable_tasks: [implement, plan, spike]
    parallelizable: true
    user_visible: false

  implement:
    description: "Execute a specific, pre-planned coding task"
    agent_description: >
      Use for well-scoped coding tasks with a clear plan. The agent works in its
      own isolated worktree and produces a commit. Use when: you have a clear
      description of what to build, which files to change, and what the result
      should look like. Can create 'test' sub-tasks to validate changes. For
      open-ended work where you're not sure what to change, use 'plan' first.
    tool_guidance: >
      Pair with 'plan' for complex work. For simple well-understood changes, use
      directly. Best when the prompt includes a specific plan or clear
      requirements.
    prompt_template: prompts/implement.md
    model_class: medium
    output_type: commit
    worktree: true
    creatable_tasks: [test]
    continuations:
      done:
        task_type: verify
    parallelizable: true
    user_visible: false

  verify:
    description: "Run the code and verify the implementation actually works"
    agent_description: >
      Adversarial verification agent. Runs builds, test suites, linters, and
      probes to confirm the implementation works correctly. Tries to break the
      code rather than confirm it works. Issues a PASS/FAIL/PARTIAL verdict.
      Adapts strategy to the change type (frontend, backend, CLI, bug fix,
      etc.). Writes ephemeral test scripts to /tmp when needed.
    prompt_template: prompts/verify.md
    model_class: medium
    output_type: report
    continuations:
      pass: # PASS or PARTIAL — both flow to review
        task_type: review
        keep_context: true
        requires_approval: true
      fail:
        task_type: implement
    parallelizable: true
    user_visible: false

  review:
    description: "Review code changes for correctness and quality"
    agent_description: >
      Final code review after verification and steward approval. Verifies the
      implementation matches the plan and is ready to land.
    prompt_template: prompts/review.md
    model_class: large
    read_only: true
    output_type: report
    continuations:
      reject:
        task_type: implement
    parallelizable: true
    user_visible: false

  # =========================================================================
  # Stewards — stateful review agents that gate approval
  # =========================================================================

  steward_quality:
    description: "Review artifacts for code quality and project conventions"
    prompt_template: prompts/steward_quality.md
    steward: true
    steward_domain: >
      Code quality, project conventions, antipatterns, consistency.
      Ensures code follows established patterns and doesn't introduce
      technical debt.
    model_class: large
    read_only: true
    output_type: report
    serial: true
    knowledge_base: .cydo/stewards/quality/
    user_visible: false

  steward_security:
    description: "Review artifacts for security vulnerabilities"
    prompt_template: prompts/steward_security.md
    steward: true
    steward_domain: >
      Security vulnerabilities, unsafe patterns, injection risks,
      authentication/authorization issues, data exposure.
    model_class: large
    read_only: true
    output_type: report
    serial: true
    knowledge_base: .cydo/stewards/security/
    user_visible: false
