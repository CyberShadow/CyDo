# CyDo Task Type Definitions
# See docs/task-types.md for design documentation.
#
# Design Principles
# =================
#
# 1. Two kinds of sessions: interactive and agentic.
#    Interactive sessions are user-facing and long-lived. Agentic sessions
#    are system-spawned, self-contained, and run to completion.
#
# 2. Interactive sessions are the decision layer.
#    They decide what to do, delegate the doing, review results, and decide
#    what's next. They never do heavy lifting themselves.
#
# 3. Interactive sessions do not end.
#    They have no terminal state. The user stays in conversation throughout.
#
# 4. Modes are interactive workflows.
#    A mode switch (keep_context continuation) changes how the interactive
#    session behaves without ending it. Modes orchestrate sub-tasks and
#    provide structured workflows for common goals (planning, debugging).
#
# 5. Agentic sessions are self-contained.
#    They take a description, do work, return a result. No user interaction.
#    All context must be in the prompt — they cannot ask for clarification.
#
# 6. Delegate aggressively.
#    Keep interactive sessions free of clutter. Research, drafting, and
#    execution happen in sub-sessions. Iteration and approval happen in
#    the interactive session.
#
# 7. Recursive decomposition.
#    Implementation is always gated behind execute. No agent can spawn
#    implement directly — it must go through execute, which decides whether
#    to implement directly or decompose into sub-tasks. This applies
#    recursively: decompose creates plans, plans go through execute, and
#    execute can decompose again. Without this gate, agents will prefer to
#    do everything in a single session rather than splitting work up.
#
# 8. Output types follow from the split.
#    Interactive sessions produce nothing (they are ongoing). Agentic
#    sessions produce artifacts: reports or commits.
#
# 9. Prompt for the behavior you want.
#    Models default to doing work inline rather than delegating or switching
#    modes. Every prompt, tool description, and agent_description must include
#    explicit guidance: when to use each tool/mode, with concrete examples,
#    and what the agent must NOT do itself (forcing delegation). Without this,
#    transitions will not happen. The simulator's --context-dump mode should
#    be used to verify that at every decision point the agent sees the right
#    guidance in its context.
#
# 10. Task types and agent types are orthogonal.
#     Task types define what work is done and how it flows. Agent types define
#     which software executes the session (Claude Code, Copilot, etc.). Every
#     task type should be executable by any supported agent. Agent-specific
#     capabilities (e.g. built-in tools, terminal access) belong on the Agent
#     interface, not in task type definitions.
#
# Flow control:
#   - creatable_tasks: modal sub-tasks (agent stays alive, gets results back)
#   - continuations: exec-style successors (agent is done, next task takes over)
#   - requires_approval: all stewards must approve before successor spawns
#
# User entry points are defined in the user_entry_points section below.
# They are edges from the user to a task type, carrying their own description,
# prompt_template for the rendered task prompt, and optional worktree config.
# All user-visible task creation flows through entry points.

user_entry_points:
  blank:
    task_type: blank
    description: "Raw agent session with no prompt wrapping or tool restrictions"
    prompt_template: prompts/blank.md
  direct:
    task_type: write_mode
    description: "Hands-on session — read-write access, edit and iterate directly"
    prompt_template: prompts/write_mode.md
  isolated:
    task_type: isolated
    worktree: require
    description: "Own worktree with sub-agent support — changes stay isolated until you pull them"
    prompt_template: prompts/isolated.md
  agentic:
    task_type: conversation
    description: "Orchestrated session — plans, delegates, and reviews via sub-agents"
    prompt_template: prompts/conversation.md

task_types:
  # =========================================================================
  # Interactive types — user-facing, context-preserving
  #
  # These are the entry points for user interaction. All continuations use
  # keep_context (SwitchMode) to preserve the session — the interactive
  # cluster is self-contained. Autonomous work (execute, implement, etc.)
  # is spawned via creatable_tasks, not continuations.
  # =========================================================================

  blank:
    icon: blank
    model_class: large
    output_type: []
    allow_native_subagents: true

  conversation:
    icon: conversation
    system_prompt_template: system_prompts/conversation.md
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      plan:
        prompt_template: prompts/plan.md
        result_note: "Read the output file for full findings. `cp` it to {{output_dir}} so you can edit it during iteration with the user."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      bug:
        prompt_template: prompts/bug.md
        result_note: "Read the output file for the full investigation report."
      execute:
        task_type: triage
        worktree: require
        prompt_template: prompts/triage.md
        result_note: "Read the output file for results. If a worktree is included, present changes to the user before pulling in."
    continuations:
      plan:
        task_type: plan_mode
        keep_context: true
        prompt_template: prompts/enter_plan_mode.md
      bug:
        task_type: bug_mode
        keep_context: true
        prompt_template: prompts/enter_bug_mode.md
      write:
        task_type: write_mode
        keep_context: true
        prompt_template: prompts/enter_write_mode.md

  plan_mode:
    icon: plan-mode
    system_prompt_template: system_prompts/plan_mode.md
    agent_description: >
      Interactive planning mode. Delegates plan drafting to a plan sub-task,
      then lets the user iterate on the result. When the plan is approved,
      switches back to conversation for implementation dispatch.

      Switch when the task needs exploration and interactive design iteration:
      - Multiple valid approaches: the task can be solved several ways (e.g.
        "add caching" — Redis vs in-memory vs file-based)
      - Architectural decisions: choosing between patterns or technologies
        (e.g. "add real-time updates" — WebSockets vs SSE vs polling)
      - Unclear scope: you need to explore before understanding the full
        extent (e.g. "make the app faster" — need to profile first)
      - Changes to existing behavior: modifying how something currently works
        (e.g. "update the login flow" — what exactly should change?)
      - User preferences matter: the implementation could reasonably go
        multiple ways — plan mode lets you explore first, then present
        options with context

      Do NOT switch for:
      - Tasks where the direction is already clear — use direct dispatch
      - Tasks where the user gave specific, detailed instructions
      - Pure research or exploration (use research sub-tasks directly)
    tool_guidance: >
      Switch when the task needs interactive exploration and design iteration
      — multiple valid approaches, unclear scope, or architectural decisions.
      If the direction is already clear, conversation can dispatch directly
      without switching. The switch preserves conversation context. Switch
      back when the plan is approved and the user is ready to implement.
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      plan:
        prompt_template: prompts/plan.md
        result_note: "Read the output file for full findings. `cp` it to {{output_dir}} so you can edit it during iteration with the user."
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
    continuations:
      back:
        task_type: conversation
        keep_context: true
        prompt_template: prompts/return_from_plan.md

  bug_mode:
    icon: bug-mode
    system_prompt_template: system_prompts/bug_mode.md
    agent_description: >
      Interactive bug investigation mode. Delegates investigation to a bug
      sub-task, then lets the user iterate on findings. When the diagnosis
      is clear, switches to plan_mode (large fix) or back to conversation
      (small fix, non-bug, or user wants to discuss).

      Switch when the user reports a specific bug to investigate
      interactively:
      - "X is broken" or "X doesn't work as expected"
      - "This test is failing and I don't know why"
      - "I'm seeing unexpected behavior in Y"
      - The user provides error messages, stack traces, or reproduction steps

      Do NOT switch for:
      - A batch of bugs (spawn bug sub-tasks directly from conversation)
      - A quick question about behavior (answer in conversation)
      - A feature request disguised as a bug (switch to plan mode instead)
    tool_guidance: >
      Switch when the user describes a specific bug or unexpected behavior
      they want to investigate interactively. Gather reproduction steps and
      error messages before switching — include them in the task description
      so the bug sub-task has full context. Switch back to conversation when
      the investigation is complete and the user is ready to act on findings.
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      bug:
        prompt_template: prompts/bug.md
        result_note: "Read the output file for the full investigation report."
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      reproduce:
        worktree: fork
        prompt_template: prompts/reproduce.md
        result_note: "Read the output file for findings. The worktree path contains the failing test."
    continuations:
      needs_plan:
        task_type: plan_mode
        keep_context: true
        prompt_template: prompts/enter_plan_mode.md
      back:
        task_type: conversation
        keep_context: true
        prompt_template: prompts/return_from_bug.md

  write_mode:
    icon: write-mode
    system_prompt_template: system_prompts/write_mode.md
    agent_description: >
      Write mode grants read-write access to the main checkout. Use when:

      - A sub-task returned a worktree with changes to cherry-pick into main
      - The user wants to iterate on cherry-picked changes (tweak, polish, test)
      - The user wants a quick direct fix (typo, config change, small edit)

      Switch when the user explicitly asks to pull in worktree results, or
      asks you to make a direct edit. Do NOT switch speculatively — only when
      the user gives clear consent to modify the main checkout.
    tool_guidance: >
      Switch when the user says things like "pull it in", "cherry-pick that",
      "apply those changes", "fix that typo", or otherwise explicitly consents
      to modifying the main checkout. Always confirm what you're about to
      cherry-pick or edit before switching.
    model_class: large
    output_type: []
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      plan:
        prompt_template: prompts/plan.md
        result_note: "Read the output file for full findings. `cp` it to {{output_dir}} so you can edit it during iteration with the user."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      bug:
        prompt_template: prompts/bug.md
        result_note: "Read the output file for the full investigation report."
    continuations:
      back:
        task_type: conversation
        keep_context: true
        prompt_template: prompts/return_from_write.md

  isolated:
    icon: crate
    system_prompt_template: system_prompts/isolated.md
    model_class: large
    output_type: []
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      plan:
        prompt_template: prompts/plan.md
        result_note: "Read the output file for full findings. `cp` it to {{output_dir}} so you can edit it during iteration with the user."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      bug:
        prompt_template: prompts/bug.md
        result_note: "Read the output file for the full investigation report."

  # =========================================================================
  # Helper types — sub-task only, no continuations
  #
  # These are created by other agents via creatable_tasks. They run to
  # completion and return their output to the parent. No state machine.
  # =========================================================================

  plan:
    icon: plan
    system_prompt_template: system_prompts/plan.md
    agent_description: >
      Software architect agent for designing implementation plans. Reads the
      codebase, identifies critical files, considers trade-offs, and returns a
      step-by-step plan with file-by-file changes. Does not write code — use
      'implement' for that. Use when: a task touches more than 2-3 files, there
      are multiple valid approaches and you need to evaluate trade-offs, you're
      unsure where to start, or the change requires understanding existing
      patterns before diving in. Plans are cheap; rework is expensive.
    tool_guidance: >
      Recommended before any non-trivial implementation. Use when a task has
      multiple valid approaches, touches many files, or requires understanding
      existing patterns before making changes.
    model_class: large
    read_only: true
    output_type: [report]
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."

  quick_research:
    icon: quick-research
    system_prompt_template: system_prompts/quick_research.md
    agent_description: >
      Fast read-only agent for targeted codebase lookups. Use when: you need
      to find a specific file, function, or pattern, answer a scoped question
      like "where is X defined?" or "what calls Y?", or do a quick lookup
      before making a decision. Returns a structured report with findings,
      file paths, and recommendations. No code changes are made.
    tool_guidance: >
      Use for quick, targeted lookups — finding a file, tracing a function,
      checking a pattern. Returns fast. Not suitable for analysis, planning, or
      or anything involving decision-making. For deeper or broader exploration,
      use deep_research instead.
    model_class: small
    read_only: true
    output_type: [report]

  deep_research:
    icon: research
    system_prompt_template: system_prompts/deep_research.md
    agent_description: >
      Thorough read-only agent for broad codebase exploration. Use when: you
      need to understand how a subsystem works before modifying it, you need
      to trace cross-cutting concerns across multiple files, the scope is
      genuinely unclear, or you're answering broad questions like "how does
      authentication work?". Can spawn quick_research sub-tasks for parallel
      lookups and spike sub-tasks to test hypotheses. Returns a structured
      report with findings, file paths, and recommendations.
    tool_guidance: >
      Use for broader exploration that requires multiple rounds of searching,
      reading, and synthesizing. For quick, targeted lookups, use
      quick_research instead.
    model_class: large
    read_only: true
    output_type: [report]
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."

  bug:
    icon: bug
    read_only: true
    system_prompt_template: system_prompts/bug.md
    agent_description: >
      Use for investigating bugs as a sub-task. The agent reproduces the issue,
      identifies the root cause, and reports findings back to the parent.
      Creates reproduce sub-tasks for reproduction and research sub-tasks for
      context. Use when: a user reports unexpected behavior, a test is
      failing and you don't know why, you need to reproduce and diagnose an
      issue, or something works differently than the code suggests it should.
    tool_guidance: >
      Provide the bug description, reproduction steps, or error messages in the
      prompt. Prefer this over investigating bugs inline — the agent has
      dedicated context for systematic debugging.
    model_class: large
    output_type: [report]
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."
      reproduce:
        worktree: fork
        prompt_template: prompts/reproduce.md
        result_note: "Read the output file for findings. The worktree path contains the failing test."

  reproduce:
    icon: reproduce
    system_prompt_template: system_prompts/reproduce.md
    agent_description: >
      Use to reproduce a bug as a failing test case. Runs in its own worktree
      and writes a test using the project's test runner that demonstrates the
      bug. Returns the worktree path so the parent can inspect the reproducer.
      The reproducer focuses on proving the bug exists — root cause analysis
      is the parent's job.
    tool_guidance: >
      Use when investigating a bug. Provide the bug description and any
      reproduction steps. The agent writes a failing test, not a standalone
      script.
    model_class: large
    output_type: [report, worktree]
    creatable_tasks:
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."

  spike:
    icon: spike
    system_prompt_template: system_prompts/spike.md
    agent_description: >
      Use when you need to test a theory, prototype an approach, or verify
      feasibility before committing to a plan. Runs in its own worktree so
      experiments don't pollute the main tree. The agent can write code, run
      tests, and try things freely. Results are reported back as a report
      that includes the worktree path, so the parent can adopt changes from
      it if the experiment was successful. Good for: "will this library work
      for our use case?", "what happens if I restructure this module?",
      "does this approach actually perform well enough?".
    tool_guidance: >
      Use when you want to try something before committing to it. The worktree
      is disposable — experiment freely.
    model_class: large
    output_type: [report, worktree]
    creatable_tasks:
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."

  test:
    icon: test
    system_prompt_template: system_prompts/test.md
    agent_description: >
      Use to add test coverage for new or changed code. Works on the same
      tree as the parent implementation task.
    model_class: medium
    output_type: []

  # =========================================================================
  # Autonomous pipeline — state machine with recursive decomposition
  #
  # These types form the plan → execute → implement → verify → review chain.
  # Agents proceed through continuations without user interaction (unless
  # gated by requires_approval). Stewards review at approval gates.
  # =========================================================================

  triage:
    icon: triage
    system_prompt_template: system_prompts/triage.md
    agent_description: >
      Validate whether a plan is implementation-ready. Decides whether to
      implement directly, decompose into implementation-ready sub-tasks, or
      send the plan back when core unknowns remain unresolved.
    tool_guidance: >
      Use to dispatch any approved plan for implementation. Pass the plan
      file path as the task description. Spawn one at a time — wait for
      completion before starting the next.
    model_class: large
    read_only: true
    output_type: [report]
    continuations:
      implement:
        task_type: implement
        requires_approval: true
        keep_context: true
        prompt_template: prompts/enter_implement.md
      decompose:
        task_type: decompose
        requires_approval: true
        keep_context: true
        prompt_template: prompts/enter_decompose.md

  decompose:
    icon: decompose
    system_prompt_template: system_prompts/decompose.md
    agent_description: >
      Use when a plan is too large or ambiguous for a single implementation
      task. Resolves bounded unknowns via planning/research/spike, then splits
      the work into smaller implementation-ready sub-tasks that are each
      executed recursively.
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      execute:
        task_type: triage
        prompt_template: prompts/triage.md
        result_note: "Read the output file for results. If a worktree is included, present changes to the user before pulling in."
      plan:
        prompt_template: prompts/plan.md
        result_note: "Read the output file for the full plan."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings. If changes should be adopted, the worktree path is included."
      quick_research:
        prompt_template: prompts/quick_research.md
        result_note: "Read the output file for findings."
      deep_research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for full findings."

  implement:
    icon: implement
    system_prompt_template: system_prompts/implement.md
    agent_description: >
      Use for well-scoped coding tasks with a clear plan. The agent works in its
      own isolated worktree and produces a commit. Use when: you have a clear
      description of what to build, which files to change, and what the result
      should look like. Can create 'test' sub-tasks to validate changes. Not
      for open-ended work where the implementation direction is still unknown.
    tool_guidance: >
      Pair with 'plan' for complex work. For simple well-understood changes, use
      directly. Best when the prompt includes a specific plan or clear
      requirements.
    model_class: medium
    output_type: [commit]
    creatable_tasks:
      test:
        prompt_template: prompts/test.md
        result_note: "Read the output file for test results."
      verify:
        worktree: fork
        prompt_template: prompts/verify.md
        result_note: "Read the output file for the full verification report."
      review:
        prompt_template: prompts/review.md
        result_note: "Read the output file for the full review."

  verify:
    icon: verify
    system_prompt_template: system_prompts/verify.md
    agent_description: >
      Adversarial verification agent. Runs builds, test suites, linters, and
      probes to confirm the implementation works correctly. Tries to break the
      code rather than confirm it works. Issues a PASS/FAIL/PARTIAL verdict.
      Adapts strategy to the change type (frontend, backend, CLI, bug fix,
      etc.). Runs in its own worktree and can write adversarial tests using
      the project's test framework.
    model_class: medium
    output_type: [report]

  review:
    icon: review
    system_prompt_template: system_prompts/review.md
    agent_description: >
      Code review agent. Verifies the implementation matches the plan and is
      ready to land. Checks for correctness, plan alignment, and adherence to
      project conventions.
    model_class: large
    read_only: true
    output_type: [report]

  # =========================================================================
  # Stewards — stateful review agents that gate approval
  # =========================================================================

  steward_quality:
    icon: steward-quality
    prompt_template: prompts/steward_quality.md
    steward: true
    steward_domain: >
      Code quality, project conventions, antipatterns, consistency.
      Ensures code follows established patterns and doesn't introduce
      technical debt.
    model_class: large
    read_only: true
    output_type: [report]
    serial: true
    knowledge_base: .cydo/stewards/quality/

  steward_security:
    icon: steward-security
    prompt_template: prompts/steward_security.md
    steward: true
    steward_domain: >
      Security vulnerabilities, unsafe patterns, injection risks,
      authentication/authorization issues, data exposure.
    model_class: large
    read_only: true
    output_type: [report]
    serial: true
    knowledge_base: .cydo/stewards/security/
