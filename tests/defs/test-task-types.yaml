# Test-only task types — appended to production types.yaml during test setup.
# Indented at 2 spaces to merge into the task_types: mapping.

  # Non-keep_context continuation for testing handoff navigation.
  # Used by continuation.spec.ts to verify focus goes to first alive ancestor.
  test_handoff:
    description: "Test type with non-keep_context continuation for e2e tests"
    prompt_template: prompts/blank.md
    model_class: small
    output_type: report
    continuations:
      done:
        task_type: blank
    user_visible: false

  # on_yield auto-continuation for e2e tests.
  # Exits cleanly without calling SwitchMode/Handoff and on_yield fires automatically.
  test_on_yield:
    description: "Test type with on_yield continuation for e2e tests"
    prompt_template: prompts/blank.md
    model_class: small
    output_type: report
    on_yield:
      task_type: blank
    user_visible: false
