# Test-only task type definitions.
#
# Independent from the production types.yaml so that production renames,
# splits, or restructuring don't break the e2e test suite. Only the types
# and references actually exercised by tests are included.

user_entry_points:
  agentic:
    task_type: conversation
    description: "Orchestrated session"
    prompt_template: prompts/conversation.md
  direct:
    task_type: write_mode
    description: "Hands-on session with read-write access"
    prompt_template: prompts/write_mode.md
  blank:
    task_type: blank
    description: "Raw agent session"
    prompt_template: prompts/blank.md
  isolated:
    task_type: isolated
    worktree: require
    description: "Own worktree with sub-agent support"
    prompt_template: prompts/isolated.md
  system_prompt_test:
    task_type: test_system_prompt
    description: "Session with task system prompt"
    prompt_template: prompts/blank.md
  sysprompt_mode_a:
    task_type: test_sysprompt_mode_a
    description: "Session with system prompt mode A"
    prompt_template: prompts/blank.md

task_types:
  blank:
    model_class: large
    output_type: []
    allow_native_subagents: true
    continuations:
      plan:
        task_type: plan_mode
        keep_context: true
        prompt_template: prompts/enter_plan_mode.md

  conversation:
    icon: conversation
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      research:
        prompt_template: prompts/deep_research.md
        result_note: "Read the output file for findings."
      spike:
        worktree: fork
        prompt_template: prompts/spike.md
        result_note: "Read the output file for findings."
      blank:
        prompt_template: prompts/blank.md
      test_handoff:
        prompt_template: prompts/blank.md
      test_on_yield:
        prompt_template: prompts/blank.md
      test_system_prompt:
        prompt_template: prompts/blank.md
      test_sysprompt_mode_a:
        prompt_template: prompts/blank.md
      triage:
        prompt_template: prompts/blank.md
      test_handoff_with_children:
        prompt_template: prompts/blank.md
    continuations:
      plan:
        task_type: plan_mode
        keep_context: true
        prompt_template: prompts/enter_plan_mode.md
      write:
        task_type: write_mode
        keep_context: true
        prompt_template: prompts/enter_write_mode.md
      implement:
        task_type: write_mode
        keep_context: true
        prompt_template: prompts/enter_write_mode.md

  plan_mode:
    icon: plan-mode
    model_class: large
    read_only: true
    output_type: []
    continuations:
      back:
        task_type: conversation
        keep_context: true
        prompt_template: prompts/return_from_plan.md

  write_mode:
    icon: write-mode
    model_class: large
    output_type: []
    continuations:
      back:
        task_type: conversation
        keep_context: true
        prompt_template: prompts/return_from_write.md

  triage:
    icon: triage
    model_class: large
    read_only: true
    output_type: [report]
    continuations:
      decompose:
        task_type: decompose
        keep_context: true
        prompt_template: prompts/enter_decompose.md

  decompose:
    icon: decompose
    model_class: large
    read_only: true
    output_type: []
    creatable_tasks:
      research:
        prompt_template: prompts/blank.md

  isolated:
    icon: crate
    model_class: large
    output_type: []
    creatable_tasks:
      test_wt_child:
        worktree: inherit
        prompt_template: prompts/blank.md
      test_commit_child:
        worktree: fork
        prompt_template: prompts/blank.md

  research:
    icon: research
    model_class: small
    read_only: true
    output_type: []
    creatable_tasks:
      research:
        prompt_template: prompts/blank.md

  spike:
    icon: spike
    model_class: large
    output_type: []

  test_handoff:
    model_class: small
    output_type: []
    continuations:
      done:
        task_type: blank
        prompt_template: prompts/blank.md

  test_on_yield:
    model_class: small
    output_type: []
    on_yield:
      task_type: blank

  test_system_prompt:
    model_class: small
    output_type: []
    system_prompt_template: prompts/test_system_prompt.md

  test_wt_child:
    model_class: small
    output_type: [report]

  test_sysprompt_mode_a:
    model_class: small
    output_type: []
    system_prompt_template: prompts/test_system_prompt_a.md
    continuations:
      check_new:
        task_type: test_sysprompt_mode_b
        keep_context: true
        prompt_template: prompts/test_sysprompt_check_b.md
      check_new_autonomous:
        task_type: test_sysprompt_mode_b
        keep_context: true
        prompt_template: prompts/test_sysprompt_check_b_autonomous.md
      check_old_absent:
        task_type: test_sysprompt_mode_b
        keep_context: true
        prompt_template: prompts/test_sysprompt_check_a.md
      check_old_user_absent:
        task_type: blank
        keep_context: true
        prompt_template: prompts/test_sysprompt_check_user_a.md

  test_sysprompt_mode_b:
    model_class: small
    output_type: []
    system_prompt_template: prompts/test_system_prompt_b.md

  test_handoff_with_children:
    model_class: small
    output_type: []
    creatable_tasks:
      research:
        prompt_template: prompts/blank.md
    continuations:
      done:
        task_type: blank
        prompt_template: prompts/blank.md

  test_commit_child:
    model_class: small
    output_type: [commit]
